server:
  port: 8090

spring:
  application:
    name: transaction-api

  datasource:
    url: ${TRANSACTION_DB_URL:jdbc:postgresql://localhost:5432/transaction_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health, info
